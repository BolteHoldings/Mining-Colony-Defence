name: Build Android

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]          # pushing a tag like v1.0.0 builds a signed release AAB
  workflow_dispatch:         # or run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps
        run: npm install

      # Generates android/ only if it isn't committed yet.
      # Once you edit AndroidManifest (e.g. the AdMob App ID), COMMIT the android/
      # folder — otherwise this step regenerates it and your edits vanish.
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android

      # ---------- Debug APK: sideload this on your phone to test ----------
      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mining-colony-defense-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # ---------- Signed release AAB: only on version tags ----------
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build signed release AAB
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload release AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: mining-colony-defense-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/release.keystore
